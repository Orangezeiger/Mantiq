description: "Mantiq – Lern-App fuer MINT-Studenten"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0                   # API-Aufrufe
  shared_preferences: ^2.3.0     # userId lokal speichern
