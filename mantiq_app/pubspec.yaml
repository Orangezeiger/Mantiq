name: mantiq_app
description: "Mantiq – Lern-App fuer MINT-Studenten"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0                   # API-Aufrufe
  shared_preferences: ^2.3.0     # userId lokal speichern
  file_picker: ^8.0.0            # PDF auswaehlen
  flutter_animate: ^4.5.0        # Animationen (Duolingo-Stil)
  package_info_plus: ^8.0.0     # App-Version aus pubspec lesen
  share_plus: ^9.0.0            # Nativer Share-Sheet (Datei/Text teilen)
  path_provider: ^2.1.0         # Temp-Verzeichnis fuer .mantiq-Datei
  flutter_local_notifications: ^18.0.0  # Streak-Erinnerungen
  timezone: ^0.9.0                      # Zeitzonen fuer geplante Benachrichtigungen
  audioplayers: ^6.1.0                  # Richtig/Falsch-Sounds

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3       # App-Icon generieren

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
