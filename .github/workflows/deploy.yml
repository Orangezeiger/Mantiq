name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'mantiq/**'

jobs:
  deploy:
    runs-on: self-hosted
    env:
      HOME: /root
      MAVEN_USER_HOME: /root/.m2
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cd mantiq
          chmod +x mvnw
          ./mvnw package -DskipTests -q

      - name: Restart
        run: |
          cp mantiq/target/mantiq-0.0.1-SNAPSHOT.jar /root/mantiq.jar
          systemctl restart mantiq
